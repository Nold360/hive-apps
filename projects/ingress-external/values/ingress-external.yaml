additionalArguments:
  - "--global.sendanonymoususage=false"
  - "--global.checknewversion=false"
  # Redirect http to https
  - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
  - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
  - "--entryPoints.websecure.http.tls=true"
  # ACME
  - "--certificatesresolvers.le.acme.email=nold-spam@pm.me"
  - "--certificatesresolvers.le.acme.storage=/data/acme.json"
  - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
  - "--providers.kubernetesCRD.allowCrossNamespace=true"
  - "--api.insecure=true"

experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: v1.4.7
    cloudflare:
      moduleName: github.com/PseudoResonance/cloudflarewarp
      version: v1.4.2

# To download plugins
env:
  - name: HTTP_PROXY
    value: http://proxy-squid.proxy.svc.cluster.local:3128
  - name: HTTPS_PROXY
    value: http://proxy-squid.proxy.svc.cluster.local:3128
  - name: NO_PROXY
    value: localhost,127.0.0.1,.cluster.local,10.0.0.0/8

ingressClass:
  enabled: true
  isDefaultClass: false
  name: "ingress-external"

providers:
  kubernetesCRD:
    enabled: true
    #ingressClass: external

  kubernetesIngress:
    #labelSelector: environment=external
    ingressClass: ingress-external
    namespaces:
    - ingress-external
    - nextcloud
    - forgejo
    - woodpecker

    publishedService:
      enabled: true

ports:
  # web:
  #   redirectTo: websecure
  websecure:
    tls:
      enabled: true
    middlewares:
      - ingress-external-cloudflare@kubernetescrd
      - ingress-external-crowdsec@kubernetescrd

globalArguments: []

ingressRoute:
  dashboard:
    enabled: false

api:
  dashboard: true

persistence:
  enabled: true

service:
  enabled: true
  type: LoadBalancer
  annotations:
    metallb.universe.tf/address-pool: external
  externalIPs:
  - 192.168.1.12

logs:
  general:
    level: DEBUG
  access:
    enabled: true
    format: json
    fields:
      headers:
        defaultmode: keep
