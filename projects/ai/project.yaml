config:
  description: LocalAI & LLM Stuff

apps:
- name: localai
  # repoURL: https://go-skynet.github.io/helm-charts
  # chart: local-ai
  # targetRevision: 3.1.0
  repoURL: https://github.com/nold360/localai-charts.git
  path: charts/local-ai
  targetRevision: main
  secrets:
    - name: localai
      keys:
        - hf-token

- name: anythingllm
  repo: bjw-s 
  chart: app-template
  targetRevision: 2.4.0

- name: browserless
  namespace: browserless
  repo: bjw-s
  chart: app-template
  targetRevision: 2.4.0

- name: hermes-agent
  namespace: hermes-agent
  repo: bjw-s
  chart: app-template
  targetRevision: 5.0.1
  secrets:
    - name: hermes-agent
      keys:
        - GITHUB_TOKEN
        - OMBI_API_KEY
        - OPENVIKING_API_KEY
        - TELEGRAM_BOT_TOKEN

- name: openviking
  namespace: openviking
  repo: bjw-s
  chart: app-template
  targetRevision: 5.0.1
