controllers:
  main:
    containers:
      main:
        image: 
          repository: ghcr.io/browserless/chromium
          tag: latest
          pullPolicy: Always
        env:
          CONCURRENT: 10
          ENABLE_DEBUGGER: "false"
          EXTERNAL: http://browserless.browserless.svc.cluster.local:3000

ingress:
  main:
    annotations:
      cert-manager.io/cluster-issuer: vault-issuer
    enabled: true
    hosts:
    - host: browserless.dc
      paths:
      - path: /
        service:
          name: main
          port: http
    tls:
    - hosts:
      - browserless.dc
      secretName: browserless-tls



securityContext:
  privileged: false

service:
  main:
    ports:
      http:
        enabled: true
        port: 3000
    type: ClusterIP
