apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
  namespace: cert-manager
spec:
  vault:
    path: pki_int/sign/dc
    server: http://vault.vault.svc.cluster.local:8200
    caBundle: 
    auth:
      kubernetes:
        role: vault-issuer
        mountPath: /v1/auth/kubernetes
        secretRef:
          name: vault-issuer-token
          key: token
